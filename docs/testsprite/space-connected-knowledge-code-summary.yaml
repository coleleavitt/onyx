meta:
  project: Onyx Space Connected Knowledge
  scope: Space detail connected-source knowledge selection for indexed Onyx connectors
  generated_on: '2026-07-22'
  branch: feat/spaces-file-source-picker

summary: >-
  Adds space-scoped connected-source knowledge selection. Spaces can reference
  already-indexed connector documents and hierarchy nodes without copying them as
  uploaded files. Backend persistence, APIs, search wiring, right-rail UI, and
  E2E/browser coverage keep uploaded files separate from connected-source scopes
  and preserve ACL filtering for each requesting user.

backend:
  schema:
    - file: backend/alembic/versions/9b1c2d3e4f5a_add_project_connected_knowledge.py
      changes:
        - creates project__document(project_id, document_id, created_at)
        - creates project__hierarchy_node(project_id, hierarchy_node_id, created_at)
        - adds indexes for reverse lookups by document_id and hierarchy_node_id
    - file: backend/onyx/db/models.py
      changes:
        - adds Project__Document and Project__HierarchyNode association models
        - adds UserProject.attached_documents and UserProject.hierarchy_nodes relationships
  db_helpers:
    - file: backend/onyx/db/projects.py
      functions:
        - replace_project_connected_knowledge: validates edit-time document/node access and replaces project selections
        - fetch_project_connected_knowledge: returns sorted attached docs/nodes
        - get_project_connected_document_ids: feeds chat/search path
        - get_project_connected_hierarchy_node_ids: feeds chat/search path
  api:
    - file: backend/onyx/server/features/projects/api.py
      endpoints:
        - GET /api/user/projects/{project_id}/connected-knowledge
        - PUT /api/user/projects/{project_id}/connected-knowledge
        - GET /api/user/projects/{project_id}/details now includes connected_knowledge
      notes:
        - endpoints intentionally omit FastAPI response_model per repo convention
        - update endpoint requires ProjectAccessPolicy.EDIT
  models:
    - file: backend/onyx/server/features/projects/models.py
      snapshots:
        - ProjectConnectedDocumentSnapshot
        - ProjectConnectedHierarchyNodeSnapshot
        - ProjectConnectedKnowledgeSnapshot
        - ProjectConnectedKnowledgeRequest
  retrieval:
    - file: backend/onyx/chat/process_message.py
      changes:
        - apply_project_connected_knowledge_to_search_params adds project docs/nodes to SearchParams
        - project connected knowledge enables SearchTool for default-persona space chats
    - file: backend/onyx/tools/tool_constructor.py
      changes:
        - merges project-selected document/node ids into SearchTool PersonaSearchInfo
    - file: backend/onyx/chat/models.py
      changes:
        - SearchParams carries project_attached_document_ids and project_hierarchy_node_ids

frontend:
  state_and_services:
    - file: web/src/lib/projects/types.ts
      changes:
        - ProjectConnectedDocument
        - ProjectConnectedHierarchyNode
        - ProjectConnectedKnowledge
        - ProjectConnectedKnowledgeUpdate
        - ProjectDetails.connected_knowledge
    - file: web/src/lib/projects/svc.ts
      functions:
        - getProjectConnectedKnowledge
        - updateProjectConnectedKnowledge
    - file: web/src/providers/ProjectsContext.tsx
      changes:
        - exposes updateProjectConnectedKnowledge
        - keeps currentProjectDetails.connected_knowledge in sync after save
  ui:
    - file: web/src/sections/projects/ProjectContextPanel.tsx
      changes:
        - renders SpaceConnectedKnowledgeModal
        - renders SpaceConnectedSourcesSection below Files
        - keeps existing FilePickerPopover/UserFilesModal local upload path intact
    - file: web/src/sections/projects/SpaceConnectedKnowledgeModal.tsx
      behaviors:
        - Connected sources tab uses SourceHierarchyBrowser for indexed connector folder/document selection
        - Uploaded files tab exposes local file and local folder upload
        - local folder upload preserves relative paths by wrapping File objects with webkitRelativePath filenames
    - file: web/src/sections/projects/SpaceConnectedSourcesSection.tsx
      behaviors:
        - groups selected connected-source documents/folders by source
        - displays individual selected folders/documents separately from uploaded Space Files
  e2e:
    - file: web/tests/e2e/pages/SpaceDetailPage.ts
      helpers:
        - openConnectedSourcesPickerAndExpectRealState
        - if selectable hierarchy exists, select/save/reload/assert rail selection
        - if no indexed hierarchy exists, assert honest empty-state branch and local upload controls
    - file: web/tests/e2e/spaces/deep_spaces_parity.spec.ts
      changes:
        - drives connected-source picker in the real authenticated Space detail flow

