project: Onyx Space Source Governance
scope: Governed, curated SharePoint connected-source selection for Spaces
tech_stack:
  backend: Python/FastAPI/SQLAlchemy/Alembic/OpenSearch
  frontend: Next.js/React/TypeScript/Opal components
  tests: pytest, Jest, Playwright, local TestSprite command inventory
backend:
  schema:
    - backend/alembic/versions/ab12cd34ef56_add_connected_source_governance.py
    - backend/alembic/versions/ac23de45fa67_add_connected_source_access_type.py
    - backend/onyx/db/models.py
  governance:
    - backend/onyx/db/connected_source_governance.py
    - backend/onyx/db/projects.py
  hierarchy_api:
    - backend/onyx/server/features/hierarchy/api.py
    - backend/onyx/server/features/hierarchy/models.py
  projects_api:
    - backend/onyx/server/features/projects/api.py
    - backend/onyx/server/features/projects/models.py
  retrieval:
    - backend/onyx/chat/models.py
    - backend/onyx/chat/process_message.py
    - backend/onyx/context/search/models.py
    - backend/onyx/context/search/pipeline.py
    - backend/onyx/document_index/opensearch/search.py
    - backend/onyx/tools/tool_constructor.py
  group_admin:
    - backend/ee/onyx/server/user_group/models.py
frontend:
  connected_source_ui:
    - web/src/sections/projects/SpaceConnectedKnowledgeModal.tsx
    - web/src/sections/projects/SpaceConnectedSourcesSection.tsx
    - web/src/sections/knowledge/SourceHierarchyBrowser.tsx
    - web/src/sections/projects/ProjectContextPanel.tsx
  project_services:
    - web/src/lib/projects/svc.ts
    - web/src/lib/projects/types.ts
    - web/src/lib/hierarchy/svc.ts
    - web/src/lib/hierarchy/interfaces.ts
  group_admin:
    - web/src/views/admin/GroupsPage/SharedGroupResources/index.tsx
    - web/src/views/admin/GroupsPage/svc.ts
    - web/src/views/admin/GroupsPage/CreateGroupPage.tsx
    - web/src/views/admin/GroupsPage/EditGroupPage.tsx
  space_creation:
    - web/src/sections/modals/CreateProjectModal.tsx
  e2e:
    - web/tests/e2e/spaces/spaces_connected_source_governance.spec.ts
features:
  - name: Admin governed source scopes
    files:
      - backend/onyx/db/connected_source_governance.py
      - backend/onyx/server/features/projects/api.py
  - name: Tenant/department SharePoint picker
    files:
      - web/src/sections/projects/SpaceConnectedKnowledgeModal.tsx
      - web/src/sections/knowledge/SourceHierarchyBrowser.tsx
  - name: Retrieval exclusions and ACL safety
    files:
      - backend/onyx/chat/process_message.py
      - backend/onyx/context/search/pipeline.py
      - backend/onyx/document_index/opensearch/search.py
  - name: Curated Space defaults
    files:
      - backend/onyx/db/connected_source_governance.py
      - web/src/sections/modals/CreateProjectModal.tsx
api_endpoints:
  - GET /api/user/projects/connected-source-scopes
  - PUT /api/user/projects/connected-source-scopes/{hierarchy_node_id}
  - GET /api/user/projects/connected-knowledge-presets
  - POST /api/user/projects/connected-knowledge-presets
  - GET /api/hierarchy-nodes?source=sharepoint
  - POST /api/hierarchy-nodes/documents
  - GET /api/user/projects/{project_id}/connected-knowledge
  - PUT /api/user/projects/{project_id}/connected-knowledge
tests:
  backend:
    - backend/tests/external_dependency_unit/projects/test_project_connected_knowledge.py
    - backend/tests/unit/onyx/document_index/test_project_connected_knowledge_filters.py
    - backend/tests/unit/onyx/server/features/projects/test_projects_route_order.py
  frontend:
    - web/src/sections/projects/SpaceConnectedKnowledgeModal.test.tsx
    - web/src/sections/knowledge/SourceHierarchyBrowser.test.tsx
    - web/src/lib/projects/svc.test.ts
  browser:
    - web/tests/e2e/spaces/spaces_connected_source_governance.spec.ts
testsprite_inventory:
  durable_inventory: docs/testsprite/space-source-governance-testsprite-tests.json
  durable_scripts:
    - docs/testsprite/space-connected-source-governance-tests/governance-backend.sh
    - docs/testsprite/space-connected-source-governance-tests/governance-frontend.sh
    - docs/testsprite/space-connected-source-governance-tests/governance-playwright.sh
    - docs/testsprite/space-connected-source-governance-tests/governance-static.sh
  stored_tests:
    - GOV-TC-001
    - GOV-TC-002
    - GOV-TC-003
    - GOV-TC-004
